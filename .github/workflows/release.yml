name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Release
        run: |
          xcodebuild build \
            -project Reef.xcodeproj \
            -scheme Reef \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/Reef.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -r build/Build/Products/Release/Reef.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "Reef ${{ github.ref_name }}" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            Reef-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Reef-${{ github.ref_name }}.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Installation

            1. Download `Reef-${{ github.ref_name }}.dmg` from the assets below.
            2. Open the DMG and drag `Reef.app` into the `Applications` shortcut.
            3. Launch Reef from `/Applications`.

            If macOS blocks the app on first launch (Gatekeeper), run the following command in Terminal to remove the quarantine flag:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Reef.app
            ```

            Then launch the app normally.

            Reef requires **Accessibility permission** to manage windows. A prompt will appear on first launch — approve it in **System Settings → Privacy & Security → Accessibility**.

            For window previews, also grant **Screen Recording** permission when prompted in Preferences.

